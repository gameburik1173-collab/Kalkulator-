<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Profit Pro</title>
    <style>
        /* Background Bergerak */
        body {
            margin: 0;
            padding: 40px 15px; /* Jarak atas bawah lebih besar agar bg terlihat */
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            box-sizing: border-box;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Kotak Kalkulator Dibuat Lebih Kecil & Ramping */
        .card { 
            background: rgba(255, 255, 255, 0.75); /* Lebih transparan */
            backdrop-filter: blur(12px); 
            padding: 20px; /* Padding dikurangi */
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 320px; /* Lebar diperkecil dari 450px ke 320px */
            margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 { color: #2c3e50; text-align: center; margin-top: 0; font-size: 18px; margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; font-size: 13px; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background: rgba(255, 255, 255, 0.6);
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: #2c3e50; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
        }

        .result { 
            margin-top: 20px; 
            padding: 15px; 
            background: #27ae60; 
            color: white; 
            border-radius: 12px; 
            text-align: center; 
        }

        .highlight { font-weight: bold; color: white; display: block; font-size: 22px; }
        
        /* Tabel Juga Dibuat Lebih Kecil */
        .table-container { 
            width: 100%; 
            max-width: 320px; 
            background: rgba(255, 255, 255, 0.8); 
            border-radius: 15px; 
            overflow: hidden; 
            display: none; 
            margin-top: 10px; 
            backdrop-filter: blur(10px);
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #2c3e50; color: white; padding: 10px; text-align: left; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 Profit Calculator</h2>
    
    <div class="input-group">
        <label>Modal Awal (USD)</label>
        <input type="number" id="modal" value="500">
    </div>
    
    <div class="input-group">
        <label>Profit Harian (%)</label>
        <input type="number" id="profit" value="5">
    </div>
    
    <div class="input-group">
        <label>Hari Kerja / Bulan</label>
        <input type="number" id="hari" value="15">
    </div>

    <div class="input-group">
        <label>Durasi (Bulan)</label>
        <input type="number" id="durasiBulan" value="12">
    </div>

    <button onclick="hitung()">HITUNG SEKARANG</button>

    <div class="result" id="resultBox" style="display:none;">
        <span style="font-size: 12px; opacity: 0.9;">Estimasi Saldo Akhir:</span>
        <span id="totalAkhir" class="highlight"></span>
    </div>
</div>

<div id="tableContainer" class="table-container">
    <table>
        <thead>
            <tr>
                <th>Bulan</th>
                <th>Hari</th>
                <th>Saldo</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    function hitung() {
        let P = parseFloat(document.getElementById('modal').value);
        let rate = parseFloat(document.getElementById('profit').value) / 100;
        let hPerBulan = parseInt(document.getElementById('hari').value);
        let totalBulan = parseInt(document.getElementById('durasiBulan').value);
        
        let tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ""; 
        let saldoSekarang = P;

        for (let b = 1; b <= totalBulan; b++) {
            saldoSekarang = saldoSekarang * Math.pow((1 + rate), hPerBulan);
            let row = `<tr>
                <td>Bln ${b}</td>
                <td>${b * hPerBulan}</td>
                <td>$${saldoSekarang.toLocaleString('en-US', {maximumFractionDigits: 0})}</td>
            </tr>`;
            tableBody.innerHTML += row;
        }

        document.getElementById('totalAkhir').innerText = "$" + saldoSekarang.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('tableContainer').style.display = 'block';
    }
</script>

</body>
</html>
