<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Compound Profit</title>
    <style>
        /* Background Bergerak */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card { 
            background: rgba(255, 255, 255, 0.9); /* Transparan sedikit */
            backdrop-filter: blur(10px); /* Efek kaca */
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 450px; 
            margin-bottom: 20px; 
            border-top: 5px solid #ffffff;
        }

        h2 { color: #2c3e50; text-align: center; margin-top: 0; font-size: 22px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #34495e; font-size: 14px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: rgba(255, 255, 255, 0.8);
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: #2c3e50; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.3s;
        }

        button:hover { background: #1a252f; transform: scale(1.02); }

        .result { 
            margin-top: 25px; 
            padding: 20px; 
            background: #27ae60; 
            color: white; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        .highlight { font-weight: bold; color: white; display: block; }
        
        .table-container { 
            width: 100%; 
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.9); 
            border-radius: 20px; 
            overflow: hidden; 
            display: none; 
            margin-top: 10px; 
            backdrop-filter: blur(10px);
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #2c3e50; color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; color: #333; }
        tr:nth-child(even) { background: rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body>

<div class="card">
    <h2>📈 Profit Calculator Pro</h2>
    
    <div class="input-group">
        <label>Modal Awal (USD)</label>
        <input type="number" id="modal" value="500">
    </div>
    
    <div class="input-group">
        <label>Profit Harian (%)</label>
        <input type="number" id="profit" value="5">
    </div>
    
    <div class="input-group">
        <label>Hari Kerja / Bulan</label>
        <input type="number" id="hari" value="15">
    </div>

    <div class="input-group">
        <label>Durasi (Bulan)</label>
        <input type="number" id="durasiBulan" value="12">
    </div>

    <button onclick="hitung()">HITUNG PROYEKSI</button>

    <div class="result" id="resultBox" style="display:none;">
        <span style="font-size: 14px; opacity: 0.9;">Total Saldo Akhir:</span>
        <span id="totalAkhir" class="highlight" style="font-size: 28px; margin-top: 5px;"></span>
    </div>
</div>

<div id="tableContainer" class="table-container">
    <table>
        <thead>
            <tr>
                <th>Bulan</th>
                <th>Hari</th>
                <th>Saldo Akhir</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    function hitung() {
        let P = parseFloat(document.getElementById('modal').value);
        let rate = parseFloat(document.getElementById('profit').value) / 100;
        let hPerBulan = parseInt(document.getElementById('hari').value);
        let totalBulan = parseInt(document.getElementById('durasiBulan').value);
        
        let tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ""; 
        let saldoSekarang = P;

        for (let b = 1; b <= totalBulan; b++) {
            saldoSekarang = saldoSekarang * Math.pow((1 + rate), hPerBulan);
            let row = `<tr>
                <td>Bulan ${b}</td>
                <td>${b * hPerBulan}</td>
                <td>$${saldoSekarang.toLocaleString('en-US', {maximumFractionDigits: 0})}</td>
            </tr>`;
            tableBody.innerHTML += row;
        }

        document.getElementById('totalAkhir').innerText = "$" + saldoSekarang.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('tableContainer').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
