<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Profit Angkasa</title>
    <style>
        /* Elemen Dasar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Mencegah scroll double */
        }

        /* Layer Canvas Bintang */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Berada di belakang konten */
            background-color: #000000; /* Hitam Angkasa */
        }

        /* Container Utama */
        .main-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Kotak berada di tengah layar */
            padding: 20px;
            box-sizing: border-box;
            z-index: 1; /* Di depan bintang */
        }

        /* Kotak Kalkulator Dibuat Lebih Kecil & Kaca */
        .card { 
            background: rgba(255, 255, 255, 0.6); /* Transparan Efek Kaca */
            backdrop-filter: blur(10px); /* Efek blur kaca */
            -webkit-backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 320px; /* Ramping sesuai permintaan */
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 { color: #000; text-align: center; margin-top: 0; font-size: 18px; margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 13px; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid rgba(0,0,0,0.2); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background: rgba(255, 255, 255, 0.5);
            color: #000;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: #27ae60; /* Hijau agar menonjol */
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.2s;
        }

        button:hover { background: #2ecc71; transform: scale(1.02); }

        .result { 
            margin-top: 20px; 
            padding: 15px; 
            background: #27ae60; 
            color: white; 
            border-radius: 10px; 
            text-align: center; 
        }

        .highlight { font-weight: bold; color: white; display: block; font-size: 22px; }
        
        /* Tabel Juga Dibuat Lebih Kecil & Kaca */
        .table-container { 
            width: 100%; 
            max-width: 320px; 
            background: rgba(255, 255, 255, 0.7); 
            border-radius: 15px; 
            overflow-y: auto; /* Bisa scroll jika panjang */
            max-height: 200px; /* Tinggi maksimal tabel */
            display: none; 
            margin-top: 10px; 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: rgba(0,0,0,0.7); color: white; padding: 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 8px 10px; border-bottom: 1px solid rgba(0,0,0,0.1); color: #000; }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="main-container">
    <div class="card">
        <h2>📊 Profit Calculator</h2>
        
        <div class="input-group">
            <label>Modal Awal (USD)</label>
            <input type="number" id="modal" value="500">
        </div>
        
        <div class="input-group">
            <label>Profit Harian (%)</label>
            <input type="number" id="profit" value="5">
        </div>
        
        <div class="input-group">
            <label>Hari Kerja / Bulan</label>
            <input type="number" id="hari" value="15">
        </div>

        <div class="input-group">
            <label>Durasi (Bulan)</label>
            <input type="number" id="durasiBulan" value="12">
        </div>

        <button onclick="hitung()">HITUNG SEKARANG</button>

        <div class="result" id="resultBox" style="display:none;">
            <span style="font-size: 12px; opacity: 0.9;">Estimasi Saldo Akhir:</span>
            <span id="totalAkhir" class="highlight"></span>
        </div>
    </div>

    <div id="tableContainer" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Bulan</th>
                    <th>Hari</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // --- SKRIP BACKGROUND BINTANG (STARFIELD) ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    // Menyesuaikan ukuran canvas ke layar penuh
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Konfigurasi Bintang
    const stars = [];
    const numStars = Math.floor((canvas.width * canvas.height) / 1000); // Jumlah bintang proporsional layar

    for (let i = 0; i < numStars; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5, // Ukuran bintang
            speed: Math.random() * 0.3 + 0.1 // Kecepatan bergerak
        });
    }

    // Fungsi Animasi Bintang
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Bersihkan canvas

        for (let star of stars) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.5})`; // Efek berkedip lembut
            ctx.fillRect(star.x, star.y, star.size, star.size);

            // Gerakkan bintang ke bawah
            star.y += star.speed;

            // Jika bintang keluar dari bawah, reset ke atas
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        }
    }

    // Jalankan Loop Animasi
    function animate() {
        drawStars();
        requestAnimationFrame(animate);
    }
    animate();


    // --- SKRIP KALKULATOR ---
    function hitung() {
        let P = parseFloat(document.getElementById('modal').value);
        let rate = parseFloat(document.getElementById('profit').value) / 100;
        let hPerBulan = parseInt(document.getElementById('hari').value);
        let totalBulan = parseInt(document.getElementById('durasiBulan').value);
        
        let tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ""; 
        let saldoSekarang = P;

        for (let b = 1; b <= totalBulan; b++) {
            saldoSekarang = saldoSekarang * Math.pow((1 + rate), hPerBulan);
            let row = `<tr>
                <td>Bln ${b}</td>
                <td>${b * hPerBulan}</td>
                <td>$${saldoSekarang.toLocaleString('en-US', {maximumFractionDigits: 0})}</td>
            </tr>`;
            tableBody.innerHTML += row;
        }

        document.getElementById('totalAkhir').innerText = "$" + saldoSekarang.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('tableContainer').style.display = 'block';
    }
</script>

</body>
</html>
